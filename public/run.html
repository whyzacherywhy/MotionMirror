<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Run Summary</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="/coach-lab.css" />
  </head>
  <body class="archive-body">
    <main class="archive-shell">
      <header class="archive-topbar">
        <div>
          <p>Run summary</p>
          <h1 id="runTitle">Saved run</h1>
        </div>
        <nav class="archive-nav">
          <a href="/">Home</a>
          <a id="backToProfile" href="/profiles.html">Profile</a>
          <a href="/coach">Coach</a>
          <button data-logout>Sign out</button>
        </nav>
      </header>

      <section class="summary-grid">
        <div class="summary-map" id="summaryMap"></div>

        <aside class="summary-panel">
          <div class="summary-metrics">
            <div><p>Time</p><strong id="summaryTime">0:00</strong></div>
            <div><p>Distance</p><strong id="summaryDistance">0.00 mi</strong></div>
            <div><p>Avg pace</p><strong id="summaryPace">--</strong></div>
            <div><p>Elevation</p><strong id="summaryElevation">--</strong></div>
            <div><p>Weather</p><strong id="summaryWeather">--</strong></div>
          </div>
          <section class="summary-elevation">
            <div>
              <p>Elevation chart</p>
              <span>saved route profile</span>
            </div>
            <canvas id="summaryElevationChart" width="320" height="96" aria-label="Saved elevation chart"></canvas>
          </section>
          <label class="notes-box">
            <p>Notes</p>
            <textarea id="runNotes" placeholder="Add coaching reflections, what worked, what to adjust next time."></textarea>
          </label>
          <button id="saveNotes" class="primary">Edit notes</button>
        </aside>
      </section>

      <section class="archive-section receipt-builder">
        <div class="section-head">
          <div>
            <p>Client receipt</p>
            <h2>Motion Mirror receipt</h2>
          </div>
        </div>

        <div class="receipt-fields">
          <label>
            <p>Coach notes</p>
            <textarea id="receiptNotes" required placeholder="What happened in the session, what you noticed, what improved, what needs attention."></textarea>
            <button id="saveReceiptNotes" type="button">Edit notes</button>
          </label>
          <label>
            <p>Next steps</p>
            <textarea id="receiptTakeaway" required placeholder="What you want the runner to work on before the next session."></textarea>
            <button id="saveReceiptHomework" type="button">Edit next steps</button>
          </label>
        </div>

        <div class="receipt-actions">
          <button id="downloadReceiptJpg" class="primary">Download receipt JPG</button>
          <button id="downloadReceiptPng">Download receipt PNG</button>
          <button id="downloadSharePng">Download transparent share PNG</button>
        </div>
      </section>

      <section class="summary-tables">
        <article>
          <div class="section-head compact">
            <div>
              <p>Per mile</p>
              <h2>Mile splits</h2>
            </div>
          </div>
          <div class="data-table" id="mileTable"></div>
        </article>

        <article>
          <div class="section-head compact">
            <div>
              <p>Coach button</p>
              <h2>Coach splits</h2>
            </div>
            <button id="editCoachSplits" type="button">Edit splits</button>
          </div>
          <div class="data-table" id="splitTable"></div>
        </article>

        <article>
          <div class="section-head compact">
            <div>
              <p>Timeline</p>
              <h2>History log</h2>
            </div>
          </div>
          <ol class="summary-history" id="summaryHistory"></ol>
        </article>
      </section>
    </main>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="/shared.js"></script>
    <script src="/theme.js"></script>
    <script src="/run-storage.js"></script>
    <script src="/profiles.js"></script>
    <script src="/session.js"></script>
  </body>
</html>
